agents:
  codex:
    type: openai
    model: 5.3-codex
    api_key: ${CODEX_API_KEY}
    max_tokens: 4000
    temperature: 0.2
    
  claude-opus:
    type: anthropic
    model: claude-opus-4.6
    api_key: ${ANTHROPIC_API_KEY}
    max_tokens: 8000
    temperature: 0.2
    
  claude-sonnet:
    type: anthropic
    model: claude-sonnet-4.6
    api_key: ${ANTHROPIC_API_KEY}
    max_tokens: 8000
    temperature: 0.2
    
  gemini:
    type: google
    model: gemini-2.5-pro
    api_key: ${GEMINI_API_KEY}
    max_tokens: 4000
    temperature: 0.2
    
  gpt4:
    type: openai
    model: gpt-4.5
    api_key: ${OPENAI_API_KEY}
    max_tokens: 4000
    temperature: 0.2
    
  kimi:
    type: openai  # Kimi 使用 OpenAI 兼容 API
    model: kimi-k2.5
    api_key: ${KIMI_API_KEY}
    endpoint: https://api.moonshot.cn/v1
    max_tokens: 4000
    temperature: 0.2
    
  opencode:
    type: local
    model: opencode-7b
    endpoint: http://localhost:8080/v1/completions
    max_tokens: 4000
    temperature: 0.2

strategies:
  fast_coding:
    primary: codex
    fallback: gemini
    
  deep_refactor:
    primary: claude-opus
    review_by: codex
    
  parallel_implementation:
    agents: [codex, claude-sonnet, gemini]
    selection: best_of_three
    
  code_review:
    agents: [claude-opus, codex]
    mode: consensus
