agents:
  codex:
    type: openai
    model: codex-latest
    api_key: ${CODEX_API_KEY}
    max_tokens: 4000
    temperature: 0.2
    
  claude:
    type: anthropic
    model: claude-sonnet-4-20250514
    api_key: ${ANTHROPIC_API_KEY}
    max_tokens: 8000
    temperature: 0.2
    
  gemini:
    type: google
    model: gemini-2.0-flash
    api_key: ${GEMINI_API_KEY}
    max_tokens: 4000
    temperature: 0.2
    
  gpt4:
    type: openai
    model: gpt-4o
    api_key: ${OPENAI_API_KEY}
    max_tokens: 4000
    temperature: 0.2
    
  opencode:
    type: local
    model: opencode-7b
    endpoint: http://localhost:8080/v1/completions
    max_tokens: 4000
    temperature: 0.2

strategies:
  fast_coding:
    primary: codex
    fallback: gemini
    
  deep_refactor:
    primary: claude
    review_by: codex
    
  parallel_implementation:
    agents: [codex, claude, gemini]
    selection: best_of_three
    
  code_review:
    agents: [claude, codex]
    mode: consensus
